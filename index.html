<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Альфа-Банк Помощник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333333);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #EF3124 0%, #B71C1C 100%);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
        }
        
        .chat-container {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 180px);
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background-color: var(--tg-theme-secondary-bg-color, #e9e9eb);
            color: var(--tg-theme-text-color, #000000);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .keyboard-container {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 12px;
            position: sticky;
            bottom: 0;
        }
        
        .keyboard-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .keyboard-btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #EF3124 0%, #B71C1C 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(239, 49, 36, 0.3);
        }
        
        .keyboard-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(239, 49, 36, 0.4);
        }
        
        .keyboard-btn:active {
            transform: scale(0.95);
        }
        
        .keyboard-btn.secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            box-shadow: 0 4px 10px rgba(108, 117, 125, 0.3);
        }
        
        .keyboard-btn.support {
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
        
        .status {
            text-align: center;
            padding: 12px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        
        .alfa-badge {
            background: rgba(239, 49, 36, 0.1);
            color: #EF3124;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        🏦 АЛЬФА-БАНК ПОМОЩНИК
    </div>
    
    <div class="chat-container" id="chatMessages">
        <div class="bot-message">
            👋 Здравствуйте! Я официальный помощник Альфа-Банка.
        </div>
        <div class="bot-message">
            💫 Здесь вы можете оформить все продукты банка по специальным ссылкам.
        </div>
    </div>
    
    <div class="keyboard-container" id="keyboardContainer">
        <div class="keyboard-row" id="keyboardRow">
            <!-- Кнопки будут добавляться сюда динамически -->
        </div>
    </div>
    
    <div class="status" id="status">
        🤖 Альфа-Банк | Официальный сервис
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Данные поддержки
        const SUPPORT_USERNAME = 'igor_alfabankk';
        
        // Состояние бота
        let currentState = 'main_menu';
        
        // Функция добавления сообщения
        function addMessage(text, isUser = false) {
            const chat = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            // Форматируем текст
            let formattedText = text.replace(/\n/g, '<br>');
            
            // Подсвечиваем ссылки
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            formattedText = formattedText.replace(urlRegex, url => 
                `<a href="${url}" target="_blank" style="color: ${isUser ? '#fff' : '#EF3124'}; text-decoration: underline;">${url}</a>`
            );
            
            messageDiv.innerHTML = formattedText;
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }
        
        // Очистка клавиатуры
        function clearKeyboard() {
            document.getElementById('keyboardRow').innerHTML = '';
        }
        
        // Показать главное меню (только Альфа-Банк и Поддержка)
        function showMainMenu() {
            clearKeyboard();
            currentState = 'main_menu';
            
            const row = document.getElementById('keyboardRow');
            
            const buttons = [
                { text: '🏦 АЛЬФА-БАНК', action: 'alfa', class: '' },
                { text: '🆘 ПОДДЕРЖКА', action: 'support', class: 'support' }
            ];
            
            buttons.forEach(button => {
                const btn = document.createElement('button');
                btn.className = `keyboard-btn ${button.class}`;
                btn.textContent = button.text;
                btn.onclick = () => handleButtonClick(button.action);
                row.appendChild(btn);
            });
        }
        
        // Показать меню Альфа-Банка (ВСЕ ВКЛАДКИ)
        function showAlfaMenu() {
            clearKeyboard();
            currentState = 'alfa_menu';
            
            const row = document.getElementById('keyboardRow');
            
            const products = [
                { text: '💰 СЧЕТ ДЛЯ ИНВЕСТИЦИЙ', link: 'https://alfa.me/5RI_Yr', emoji: '💰' },
                { text: '📊 СЧЕТ ИП', link: 'https://alfa.me/bv8nch', emoji: '📊' },
                { text: '💳 КРЕДИТНАЯ КАРТА', link: 'https://alfa.me/hTFvDV', emoji: '💳' },
                { text: '💳 ДЕБЕТОВАЯ КАРТА', link: 'https://alfa.me/-EMo6O', emoji: '💳' },
                { text: '⭐ ALFA ONLY', link: 'https://alfa.me/sZMzzo', emoji: '⭐' },
                { text: '🏷️ ПЛАТЕЖНЫЙ СТИКЕР', link: 'https://alfa.me/8snsHH', emoji: '🏷️' },
                { text: '✈️ ALFA TRAVEL', link: 'https://alfa.me/csys3Z', emoji: '✈️' },
                { text: '🔙 ГЛАВНОЕ МЕНЮ', action: 'back_to_main', class: 'secondary' }
            ];
            
            products.forEach(product => {
                const btn = document.createElement('button');
                btn.className = `keyboard-btn ${product.class || ''}`;
                btn.textContent = product.emoji ? `${product.emoji} ${product.text}` : product.text;
                
                if (product.link) {
                    btn.onclick = () => {
                        addMessage(product.text, true);
                        addMessage(`✨ Открываю страницу оформления:\n${product.link}\n\n✅ Нажмите на ссылку выше, чтобы перейти на официальный сайт Альфа-Банка.`);
                        tg.openLink(product.link);
                    };
                } else if (product.action) {
                    btn.onclick = () => handleButtonClick(product.action);
                }
                
                row.appendChild(btn);
            });
        }
        
        // Показать меню поддержки
        function showSupportMenu() {
            clearKeyboard();
            currentState = 'support';
            
            const row = document.getElementById('keyboardRow');
            
            // Сообщение о поддержке
            addMessage('🆘 Служба поддержки', false);
            addMessage(`👤 Наш специалист @${SUPPORT_USERNAME} готов помочь вам с:\n\n• Оформлением продуктов\n• Вопросами по картам\n• Технической поддержкой\n• Консультацией`, false);
            
            const supportBtn = document.createElement('button');
            supportBtn.className = 'keyboard-btn support';
            supportBtn.textContent = '💬 НАПИСАТЬ В ПОДДЕРЖКУ';
            supportBtn.onclick = () => {
                addMessage('💬 Написать в поддержку', true);
                addMessage(`👤 Перехожу в чат с поддержкой: @${SUPPORT_USERNAME}\n\nЗадайте любой вопрос — ответим в течение 5 минут!`);
                tg.openTelegramLink(`https://t.me/${SUPPORT_USERNAME}`);
            };
            row.appendChild(supportBtn);
            
            const backBtn = document.createElement('button');
            backBtn.className = 'keyboard-btn secondary';
            backBtn.textContent = '🔙 ГЛАВНОЕ МЕНЮ';
            backBtn.onclick = () => handleButtonClick('back_to_main');
            row.appendChild(backBtn);
        }
        
        // Обработка нажатий на кнопки
        function handleButtonClick(action) {
            switch(action) {
                case 'alfa':
                    addMessage('🏦 Альфа-Банк', true);
                    addMessage('🏦 **АЛЬФА-БАНК**\n\nВыберите продукт для оформления:\n\n💎 Все продукты с особыми условиями\n⚡️ Мгновенное оформление\n✅ Официальные ссылки', false);
                    showAlfaMenu();
                    break;
                    
                case 'support':
                    addMessage('🆘 Поддержка', true);
                    showSupportMenu();
                    break;
                    
                case 'back_to_main':
                    addMessage('🔙 Назад в главное меню', true);
                    addMessage('🏦 **АЛЬФА-БАНК**\n\nВыберите нужный раздел:', false);
                    showMainMenu();
                    break;
                    
                default:
                    console.log('Unknown action:', action);
            }
        }
        
        // ПРОДАЮЩЕЕ ПРИВЕТСТВИЕ
        function handleStart() {
            addMessage('/start', true);
            addMessage(`🔥 **ЭКСКЛЮЗИВНЫЕ УСЛОВИЯ АЛЬФА-БАНКА** 🔥

👋 Здравствуйте! Я ваш персональный помощник.

🎁 **ТОЛЬКО СЕЙЧАС:**
✅ Бесплатное обслуживание НАВСЕГДА
✅ Кэшбэк до 30% на все покупки
✅ 500 ₽ на кофе каждую неделю
✅ Доступ в бизнес-залы аэропортов

💳 **Оформите прямо сейчас:**
• 💰 Счет для инвестиций — доход до 15%
• 📊 Счет для ИП — первые 6 месяцев 0 ₽
• 💳 Кредитная карта — до 1 000 000 ₽
• 💳 Дебетовая карта — кэшбэк 30%
• ⭐ Alfa Only — премиум обслуживание
• 🏷️ Платежный стикер — платите телефоном
• ✈️ Alfa Travel — кэшбэк на путешествия

⚡️ **Успейте! Предложения ограничены**

👇 Выберите продукт 👇`);
            showMainMenu();
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            handleStart();
            
            tg.sendData(JSON.stringify({ 
                action: 'start',
                user_id: tg.initDataUnsafe?.user?.id || 'unknown'
            }));
            
            document.body.style.backgroundColor = tg.themeParams.bg_color || '#f5f5f5';
        });
        
        // Обработка кнопки назад
        tg.onEvent('backButtonClicked', () => {
            if (currentState !== 'main_menu') {
                handleButtonClick('back_to_main');
            } else {
                tg.close();
            }
        });
        
        tg.onEvent('mainButtonClicked', () => {
            if (currentState !== 'main_menu') {
                tg.BackButton.show();
            } else {
                tg.BackButton.hide();
            }
        });
        
        console.log('Альфа-Банк помощник запущен!');
    </script>
</body>
</html>
